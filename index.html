<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0c0e12" />
  <meta name="description" content="Ascendant EQ public investigation report — login, hosting, donations, enforcement." />
  <title>Ascendant EQ · Investigation Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="assets/site/theme.css" />
</head>
<body>
  <div id="app">Loading report…</div>
  <script>
    window.$docsify = {
      name: 'Ascendant EQ',
      repo: 'belvue/ascendant-report',
      homepage: 'README.md',
      loadSidebar: true,
      loadCoverpage: true,
      coverpage: true,
      onlyCover: false,
      subMaxLevel: 3,
      auto2top: true,
      relativePath: true,
      maxLevel: 3,
      notFoundPage: true,
      search: {
        placeholder: 'Search chapters…',
        noData: 'No matches',
        depth: 4,
        hideOtherSidebarContent: false,
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
        crossChapterText: true,
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied',
      },
    };

    window.$docsify.plugins = [].concat(window.$docsify.plugins || [], [
      function footer(hook) {
        hook.doneEach(function () {
          var el = document.querySelector('.report-site-footer');
          if (!el) {
            el = document.createElement('div');
            el.className = 'report-site-footer';
            el.innerHTML =
              'Public investigation package · ' +
              '<a href="https://github.com/belvue/ascendant-report" target="_blank" rel="noopener">Source on GitHub</a>';
            var section = document.querySelector('.markdown-section');
            if (section && section.parentNode) {
              section.parentNode.appendChild(el);
            }
          }
        });
      },
    ]);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0b0b0d" />
  <meta name="description" content="Ascendant EQ public investigation report — login, hosting, donations, enforcement." />
  <title>Ascendant EQ · Investigation Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/site/theme.css" />
</head>
<body>
  <div id="app">Loading report…</div>
  <script>
    window.$docsify = {
      name:
        '<div class="report-sidebar-brand">' +
        '<span class="report-sidebar-title">Ascendant EQ</span>' +
        '<span class="report-sidebar-sub">Investigation Report</span>' +
        '</div>',
      homepage: 'README.md',
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true,
      relativePath: false,
      maxLevel: 3,
      notFoundPage: true,
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
        crossChapterText: true,
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied',
      },
    };

    window.$docsify.plugins = [].concat(window.$docsify.plugins || [], [
      function fixStackedRootLinks(hook, vm) {
        var rootOnly = {
          '00-credential-warning.md': 1,
          '01-why-this-exists.md': 1,
          '01b-before-going-public.md': 1,
          '02-executive-summary.md': 1,
          '03-login-trust-boundary.md': 1,
          '03b-loginserver-lab-methodology.md': 1,
          '04-infrastructure-security.md': 1,
          '04b-operational-security.md': 1,
          '05-donations-moa-kofi.md': 1,
          '06-enforcement-asymmetry.md': 1,
          '07-anti-cheat-and-patcher.md': 1,
          '08-referrals-leaderboards.md': 1,
          '09-botwatch-methodology.md': 1,
          '09b-botwatch-capabilities.md': 1,
          '10-witness-summary.md': 1,
          '11-hosting-cost-gap.md': 1,
          '12-operator-presence.md': 1,
          '13-what-you-can-do.md': 1,
          '14-reporter-account.md': 1,
          '14b-preliminary-rca.md': 1,
          '14c-may-5-ledger-audit.md': 1,
          '14d-anti-cheat-layers.md': 1,
          '15-closing-statements.md': 1,
          'evidence-index.md': 1,
        };
        var briefByPrefix = {
          LS: 'operator-share/01-loginserver-brief',
          RH: 'operator-share/02-residential-host-brief',
          DT: 'operator-share/03-transparency-and-accountability',
          KF: 'operator-share/03-transparency-and-accountability',
          TR: 'operator-share/03-transparency-and-accountability',
          PC: 'operator-share/04-client-patcher-integrity',
          PF: 'operator-share/05-project-funding-and-operator-compensation',
        };

        function canonicalFinding(path) {
          var clean = (path || '').replace(/^\//, '').replace(/\.md$/i, '');
          if (!clean) return null;
          var slugMatch = clean.match(/([A-Z]{2,3}-\d{3}-[a-z0-9-]+)$/i);
          if (!slugMatch) return null;
          var slug = slugMatch[1];
          var prefix = slug.match(/^([A-Z]{2,3})-/)[1];
          var brief = briefByPrefix[prefix];
          if (!brief) return null;
          if (clean.indexOf(brief + '/') === 0) return null;
          var tierMatch = clean.match(/(P[0-3]-(?:immediate|high|medium|informational))\//);
          if (!tierMatch) return null;
          return '/' + brief + '/' + tierMatch[1] + '/' + slug + '.md';
        }

        hook.beforeEach(function (content, next) {
          var path = (vm.route.path || '').replace(/^\//, '');
          if (!path) {
            next(content);
            return;
          }

          var findingTarget = canonicalFinding(path);
          if (findingTarget) {
            vm.router.to(findingTarget);
            return;
          }

          if (path.indexOf('/') === -1) {
            next(content);
            return;
          }
          var parts = path.split('/');
          var last = parts[parts.length - 1];
          var file = /\.[a-z0-9]+$/i.test(last) ? last : last + '.md';
          if (rootOnly[file]) {
            vm.router.to('/' + file);
            return;
          }
          next(content);
        });
      },
      function pinSidebar(hook) {
        hook.mounted(function () {
          document.body.classList.remove('close');
        });
        hook.doneEach(function () {
          document.body.classList.remove('close');
          var content = document.querySelector('.content');
          if (content) {
            content.style.left = '0';
            content.style.position = 'relative';
          }
        });
      },
      function reportChrome(hook) {
        hook.doneEach(function () {
          var main = document.querySelector('.content');
          var section = document.querySelector('.markdown-section');
          if (!main || !section) return;

          if (!document.querySelector('.report-topbar')) {
            var topbar = document.createElement('div');
            topbar.className = 'report-topbar';
            topbar.innerHTML =
              '<span class="report-topbar-label">Public record</span>' +
              '<span class="report-topbar-title">Ascendant EQ Investigation</span>';
            main.insertBefore(topbar, main.firstChild);
          }

          if (!section.closest('.report-article-panel')) {
            var shell = document.createElement('div');
            shell.className = 'report-article-shell';
            var panel = document.createElement('div');
            panel.className = 'report-article-panel';
            section.parentNode.insertBefore(shell, section);
            shell.appendChild(panel);
            panel.appendChild(section);
          }

          var footer = document.querySelector('.report-site-footer');
          if (!footer) {
            footer = document.createElement('div');
            footer.className = 'report-site-footer';
            footer.innerHTML =
              'Public investigation package · ' +
              '<a href="https://github.com/belvue/ascendant-report" target="_blank" rel="noopener">Source on GitHub</a>';
            main.appendChild(footer);
          }
        });
      },
    ]);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ascendant EQ public investigation report" />
  <title>Ascendant EQ Investigation Report</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --theme-color: #3d5a80;
      --content-max-width: 52rem;
    }
    .app-name-link img { max-height: 2rem; }
    .markdown-section {
      max-width: 48rem;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      font-size: 1.02rem;
      line-height: 1.65;
    }
    .markdown-section h1 { font-size: 1.85rem; border-bottom: 1px solid #e8e8e8; padding-bottom: 0.4rem; }
    .markdown-section h2 { font-size: 1.35rem; margin-top: 2rem; }
    .markdown-section h3 { font-size: 1.12rem; }
    .markdown-section table { display: block; overflow-x: auto; font-size: 0.92rem; }
    .markdown-section img { max-width: 100%; border: 1px solid #eee; border-radius: 4px; }
    .sidebar { width: 18rem; }
    .sidebar-nav > ul > li > p { font-weight: 600; margin-top: 0.75rem; }
    @media (max-width: 768px) {
      .sidebar { width: 16rem; }
    }
  </style>
</head>
<body>
  <div id="app">Loading report…</div>
  <script>
    window.$docsify = {
      name: 'Ascendant EQ Report',
      repo: 'belvue/ascendant-report',
      homepage: 'README.md',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      relativePath: true,
      maxLevel: 3,
      search: {
        placeholder: 'Search chapters…',
        noData: 'No matches',
        depth: 4,
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
